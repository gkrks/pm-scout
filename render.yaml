services:
  - type: web
    name: pm-scout
    runtime: node
    region: oregon
    plan: free
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: node dist/index.js serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # set this manually in the Render dashboard
