services:
  - type: web
    name: pm-scout
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci --omit=dev && (PLAYWRIGHT_BROWSERS_PATH=./pw-browsers ./node_modules/.bin/playwright install chromium --with-deps || apt-get install -y chromium-browser chromium || true)
    startCommand: node dist/index.js serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false   # set this manually in the Render dashboard
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: ./pw-browsers
