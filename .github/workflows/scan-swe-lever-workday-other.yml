name: "SWE Scan: Lever + Workday + Other"

on:
  schedule:
    # Every hour at :24
    - cron: "24 * * * *"

  workflow_dispatch:
    inputs:
      ignore_blackout:
        description: "Run even if currently in the blackout window"
        type: boolean
        default: false

concurrency:
  group: scan-swe-lever-workday-other
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Write .env from secret
        run: printf '%s\n' "$PM_JOBS" > .env
        env:
          PM_JOBS: ${{ secrets.PM_JOBS }}

      - name: Sync companies to Supabase
        run: npx ts-node scripts/syncCompanies.ts

      - name: Run Lever + Workday + Other scanner (SWE only)
        run: npx ts-node scripts/runScan.ts
        env:
          SCAN_POOL:               lever,workday,other
          IGNORE_BLACKOUT:         'true'
          DISPLAY_TIMEZONE:        America/Los_Angeles
          NOTIFY_ROLE_CATEGORIES:  SWE
          RUN_TRIGGER:             ${{ github.event_name }}
          RUN_ID_GH:               ${{ github.run_id }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scan-swe-lever-workday-other-logs-${{ github.run_id }}
          path: data/pending-supabase.json
          retention-days: 7
          if-no-files-found: ignore
