name: "Scan: Workday"

on:
  schedule:
    # Every 3 hours, offset by 30min from other pools to spread load
    # UTC hours: 0:30, 3:30, 6:30, 9:30, 12:30, 15:30, 18:30, 21:30
    - cron: "30 0,3,6,9,12,15,18,21 * * *"

  workflow_dispatch:
    inputs:
      ignore_blackout:
        description: "Run even if currently in the blackout window"
        type: boolean
        default: false

concurrency:
  group: scan-workday
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env from secret
        run: printf '%s\n' "$PM_JOBS" > .env
        env:
          PM_JOBS: ${{ secrets.PM_JOBS }}

      - name: Sync companies to Supabase
        run: npx ts-node scripts/syncCompanies.ts

      - name: Run Workday scanner
        run: npx ts-node scripts/runScan.ts
        env:
          SCAN_POOL:           workday
          IGNORE_BLACKOUT:     'true'
          DISPLAY_TIMEZONE:    America/Los_Angeles
          RUN_TRIGGER:         ${{ github.event_name }}
          RUN_ID_GH:           ${{ github.run_id }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scan-workday-logs-${{ github.run_id }}
          path: data/pending-supabase.json
          retention-days: 7
          if-no-files-found: ignore
