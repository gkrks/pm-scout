name: Hourly Job Scan

on:
  schedule:
    # Run at the top of every hour, every day.
    # The runtime blackout guard in scripts/runScan.js exits cleanly during
    # 17:00–04:59 America/Los_Angeles. Cron is UTC-only and cannot express a
    # Pacific-local window across DST, so the guard lives in code.
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      ignore_blackout:
        description: "Run even if currently in the blackout window (5 PM–5 AM Pacific)"
        type: boolean
        default: false
      pool:
        description: "Which scraper pool to run"
        type: choice
        options: [all, api, playwright]
        default: all

# If a run is in-flight when the next hour fires, queue — don't kill.
# Killing mid-run leaves parser_runs.status = 'running' orphans in Supabase.
concurrency:
  group: hourly-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12   # hard kill if a run somehow exceeds budget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Write .env from secret
        run: printf '%s\n' "$PM_JOBS" > .env
        env:
          PM_JOBS: ${{ secrets.PM_JOBS }}

      - name: Sync companies to Supabase
        run: npx ts-node scripts/syncCompanies.ts

      - name: Run scanner
        run: npx ts-node scripts/runScan.ts
        env:
          # Scheduling controls (vary per run — not in .env)
          IGNORE_BLACKOUT:     ${{ github.event.inputs.ignore_blackout || 'false' }}
          SCAN_POOL:           ${{ github.event.inputs.pool || 'all' }}
          BLACKOUT_TIMEZONE:   America/Los_Angeles
          BLACKOUT_START_HOUR: '17'
          BLACKOUT_END_HOUR:   '5'
          DISPLAY_TIMEZONE:    America/Los_Angeles
          # Run identity
          RUN_TRIGGER: ${{ github.event_name }}
          RUN_ID_GH:   ${{ github.run_id }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs-${{ github.run_id }}
          path: |
            data/pending-supabase.json
          retention-days: 7
          if-no-files-found: ignore
